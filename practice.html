<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單項練習 — TOEIC Reading</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; }

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #e0ddd6;
  display: flex; align-items: center; gap: 1rem; padding: 0 1.5rem; height: 52px;
}
.topbar-home { font-size: 13px; color: #888; text-decoration: none; }
.topbar-home:hover { color: #378ADD; }
.topbar-title { font-size: 14px; font-weight: 600; flex: 1; }
.topbar-badge { font-size: 11px; background: #EBF4FF; color: #378ADD; border: 1px solid #c8dcf5; padding: 3px 10px; border-radius: 20px; }

.main { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

.part-header { background: #fff; border: 1px solid #e0ddd6; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.part-hdr-top { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: #378ADD; text-transform: uppercase; margin-bottom: 4px; }
.part-hdr-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.part-hdr-dir { font-size: 15px; color: #666; line-height: 1.6; }

.q-card { background: #fff; border: 1px solid #e0ddd6; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; scroll-margin-top: 70px; }
.q-num { font-size: 13px; color: #aaa; letter-spacing: 0.06em; margin-bottom: 8px; }
.q-text { font-size: 17px; font-weight: 500; color: #1a1a1a; line-height: 1.7; margin-bottom: 1rem; }
.blank { display: inline-block; min-width: 64px; border-bottom: 2px solid #378ADD; margin: 0 2px; }

.passage-block { background: #fafaf8; border: 1px solid #e8e5de; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; font-size: 16px; line-height: 1.8; color: #333; }
.passage-block .blank { min-width: 80px; }
.passage-meta { font-size: 11px; color: #aaa; margin-bottom: 8px; letter-spacing: 0.04em; }
.reading-passage { background: #fafaf8; border: 1px solid #e8e5de; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; font-size: 15.5px; line-height: 1.85; color: #333; }
.reading-passage h4 { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #555; letter-spacing: 0.04em; text-transform: uppercase; }
.reading-passage p { margin-bottom: 0.75rem; }
.reading-passage p:last-child { margin-bottom: 0; }
.reading-passage .doc-label { font-size: 11px; background: #eeecea; display: inline-block; padding: 2px 8px; border-radius: 4px; margin-bottom: 10px; color: #666; }
.double-passage-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.triple-passage-wrap { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

.options { display: flex; flex-direction: column; gap: 7px; }
.opt-btn { display: flex; align-items: flex-start; gap: 10px; padding: 9px 14px; border: 1px solid #e0ddd6; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 16px; color: #1a1a1a; transition: all 0.12s; line-height: 1.5; }
.opt-btn:hover:not(.disabled) { border-color: #bbb; background: #f8f7f5; }
.opt-label { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; color: #888; transition: all 0.12s; margin-top: 1px; }
.opt-btn.selected { border-color: #378ADD; background: #EBF4FF; }
.opt-btn.selected .opt-label { background: #378ADD; border-color: #378ADD; color: #fff; }
.opt-btn.correct { border-color: #1D9E75; background: #E1F5EE; }
.opt-btn.correct .opt-label { background: #1D9E75; border-color: #1D9E75; color: #fff; }
.opt-btn.wrong { border-color: #E24B4A; background: #FCEBEB; }
.opt-btn.wrong .opt-label { background: #E24B4A; border-color: #E24B4A; color: #fff; }
.opt-btn.show-correct { border-color: #1D9E75; }
.opt-btn.show-correct .opt-label { background: #1D9E75; border-color: #1D9E75; color: #fff; }
.opt-btn.disabled { cursor: default; }

.explanation { margin-top: 0.875rem; padding: 0.875rem 1rem; background: #f5f5f3; border-radius: 8px; border-left: 3px solid #378ADD; display: none; }
.explanation.show { display: block; }
.exp-answer { font-size: 13px; font-weight: 600; color: #185FA5; margin-bottom: 5px; letter-spacing: 0.04em; text-transform: uppercase; }
.exp-text { font-size: 15px; color: #333; line-height: 1.7; }
.exp-zh { font-size: 15px; color: #666; margin-top: 5px; line-height: 1.6; }
.exp-trans { font-size: 15px; color: #444; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ddd; line-height: 1.65; }
.exp-trans-label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; color: #aaa; text-transform: uppercase; margin-bottom: 3px; }

.bottom-bar { position: sticky; bottom: 0; background: #fff; border-top: 1px solid #e0ddd6; padding: 1rem 0; display: flex; align-items: center; gap: 1rem; margin-top: 1.5rem; }
.btn-submit { padding: 12px 32px; background: #378ADD; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn-submit:hover { opacity: 0.88; }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.post-actions { display: none; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 1.5rem; padding: 1rem 0; border-top: 1px solid #e0ddd6; }
.post-actions.show { display: flex; }
.btn-retry { padding: 11px 24px; background: #fff; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; cursor: pointer; }
.btn-retry:hover { background: #f5f5f3; }
.btn-more { padding: 11px 20px; background: #EBF4FF; border: 1px solid #c8dcf5; border-radius: 8px; font-size: 14px; color: #378ADD; font-weight: 500; cursor: pointer; }
.btn-more:hover { background: #d8ecff; }
.btn-home { padding: 11px 20px; background: #fff; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; color: #555; }
.btn-home:hover { background: #f5f5f3; }
.progress-text { font-size: 13px; color: #888; flex: 1; text-align: right; }

/* SCORE PANEL */
.score-panel { display: none; background: #fff; border: 1px solid #e0ddd6; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; text-align: center; }
.score-panel.show { display: block; }
.score-big { font-size: 52px; font-weight: 600; line-height: 1; }
.score-big span { font-size: 18px; font-weight: 400; color: #aaa; }
.score-pct { font-size: 16px; color: #888; margin-top: 6px; }
.score-label { font-size: 13px; color: #aaa; margin-top: 4px; }
.submit-status { font-size: 13px; color: #aaa; margin-top: 10px; display: none; }
.submit-status.show { display: block; }

/* START SCREEN */
.start-screen { display: flex; position: fixed; inset: 0; background: #f5f5f3; z-index: 300; align-items: center; justify-content: center; padding: 1.5rem; }
.start-screen.hidden { display: none; }
.start-box { background: #fff; border: 1px solid #e0ddd6; border-radius: 16px; width: 100%; max-width: 420px; overflow: hidden; }
.start-head { background: #1a1a1a; color: #fff; padding: 1.75rem 2rem 1.5rem; }
.start-tag { font-size: 11px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.start-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.start-sub { font-size: 14px; color: #aaa; }
.start-body { padding: 1.5rem 2rem 2rem; }
.start-label { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
.start-input { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; transition: border-color 0.15s; margin-bottom: 1.25rem; }
.start-input:focus { border-color: #378ADD; }
.start-btn { width: 100%; padding: 13px; background: #378ADD; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.start-btn:hover { opacity: 0.88; }

@media (max-width: 600px) {
  .double-passage-wrap, .triple-passage-wrap { grid-template-columns: 1fr; }
  .q-text { font-size: 16px; }
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
  <div class="start-box">
    <div class="start-head">
      <div class="start-tag">TOEIC Reading · 單項練習</div>
      <div class="start-title" id="startTitle"></div>
      <div class="start-sub" id="startSub"></div>
    </div>
    <div class="start-body">
      <div class="start-label">姓名（作答紀錄用）<span style="font-size:12px;color:#aaa;font-weight:400;margin-left:6px;">非必填</span></div>
      <input class="start-input" id="studentName" type="text" placeholder="請輸入姓名（可留空）" maxlength="30"
             onkeydown="if(event.key==='Enter') startPractice()">
      <button class="start-btn" onclick="startPractice()">開始練習 →</button>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <a class="topbar-home" href="index.html">← 首頁</a>
  <div class="topbar-title" id="topTitle">單項練習</div>
  <div class="topbar-badge" id="topBadge"></div>
</div>

<div class="main">
  <div class="score-panel" id="scorePanel">
    <div class="score-big" id="scoreBig">0 <span>/ 0</span></div>
    <div class="score-pct" id="scorePct"></div>
    <div class="score-label">作答完畢</div>
    <div class="submit-status" id="submitStatus"></div>
  </div>

  <div class="part-header" id="partHeader">
    <div class="part-hdr-top" id="partTag"></div>
    <div class="part-hdr-title" id="partTitle"></div>
    <div class="part-hdr-dir" id="partDir"></div>
  </div>

  <div id="qbody"></div>

  <div class="bottom-bar">
    <button class="btn-submit" id="submitBtn" onclick="submitPractice()" disabled>交卷</button>
    <div class="progress-text" id="progressText">0 / 0 已作答</div>
  </div>

  <div class="post-actions" id="postActions">
    <button class="btn-retry" onclick="location.reload()">再練一次</button>
    <button class="btn-more" id="more5Btn" onclick="goMore(5)" style="display:none">再來 5 題</button>
    <button class="btn-more" id="more10Btn" onclick="goMore(10)" style="display:none">再來 10 題</button>
    <a class="btn-home" href="index.html">← 回首頁</a>
  </div>
</div>

<script src="questions.js"></script>
<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby7jsyHd1GzsUXGZdIJPdxtesde4cwHKGx4_y0c_9DFJrOLCm8oPes2OxyIIDTCIW4n2g/exec';

// ─────────────────────────────────────────
// QUESTION DATA
// ─────────────────────────────────────────
const P5 = Q_P5_ALL;

const P6 = Q_P6_ALL;

const P7 = Q_P7_ALL;

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const PART     = parseInt(params.get('part')) || 5;
const N        = Math.min(30, Math.max(1, parseInt(params.get('n')) || 10));

let questions  = [];   // { id, q, opts, ans, exp, zh, trans?, qn? }
let answered   = {};   // id → option index
let submitted  = false;
let studentName = '';
let setLabel   = '';

// ─────────────────────────────────────────
// INIT START SCREEN
// ─────────────────────────────────────────
(function initStartScreen() {
  let title = '', sub = '';
  if (PART === 5) { title = `Part 5 · ${N} 題練習`; sub = `從 60 題中隨機選出 ${N} 題`; }
  if (PART === 6) { title = 'Part 6 · 段落填空'; sub = '隨機一組段落填空（4 題）'; }
  if (PART === 7) { title = 'Part 7 · 閱讀理解'; sub = '隨機一組閱讀理解'; }
  document.getElementById('startTitle').textContent = title;
  document.getElementById('startSub').textContent   = sub;
})();

function startPractice() {
  studentName = document.getElementById('studentName').value.trim() || '匿名';
  document.getElementById('startScreen').classList.add('hidden');
  buildPractice();
}

// ─────────────────────────────────────────
// BUILD QUESTIONS
// ─────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPractice() {
  const body = document.getElementById('qbody');
  body.innerHTML = '';

  if (PART === 5) buildP5(body);
  else if (PART === 6) buildP6(body);
  else buildP7(body);

  updateProgress();
  document.getElementById('submitBtn').disabled = false;
}

function makeBlank(text) {
  return text.replace(/-------/g, '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
}

// ── Part 5 ──
function buildP5(body) {
  const selected = shuffle(P5).slice(0, N);
  questions = selected.map((q, i) => ({ id: i, ...q }));

  const partTag = `Part 5 · ${N} 題`;
  document.getElementById('topTitle').textContent = 'Part 5 單項練習';
  document.getElementById('topBadge').textContent = `${N} 題`;
  document.getElementById('partTag').textContent   = partTag;
  document.getElementById('partTitle').textContent = 'Incomplete Sentences';
  document.getElementById('partDir').textContent   = 'A word or phrase is missing in each sentence. Select the best answer to complete the sentence.';
  setLabel = `Part 5 · ${N}題 (隨機)`;

  questions.forEach(q => body.appendChild(makeQCard(q)));
}

// ── Part 6 ──
function buildP6(body) {
  const set = P6[Math.floor(Math.random() * P6.length)];
  setLabel = `Part 6 · ${set.label}`;

  document.getElementById('topTitle').textContent = 'Part 6 單項練習';
  document.getElementById('topBadge').textContent = set.label;
  document.getElementById('partTag').textContent   = `Part 6 · 段落填空`;
  document.getElementById('partTitle').textContent = 'Text Completion';
  document.getElementById('partDir').textContent   = 'Read the passage and choose the best word, phrase, or sentence for each blank.';

  let pText = set.text;
  set.qs.forEach(q => {
    pText = pText.replace(`[${q.n}]`, `<span class="blank" style="min-width:90px;">&nbsp;(${q.n})&nbsp;</span>`);
  });
  pText = pText.replace(/\n/g, '<br>');

  const passDiv = document.createElement('div');
  passDiv.innerHTML = `<div class="passage-block"><div class="passage-meta">${set.meta}</div>${pText}</div>`;
  body.appendChild(passDiv);

  questions = set.qs.map((q, i) => ({
    id: i, qn: q.n, q: `Choose the best answer for blank (${q.n}).`,
    opts: q.opts, ans: q.ans, exp: q.exp, zh: q.zh
  }));
  questions.forEach(q => body.appendChild(makeQCard(q)));
}

// ── Part 7 ──
function buildP7(body) {
  const set = P7[Math.floor(Math.random() * P7.length)];
  setLabel = `Part 7 · ${set.label}`;

  document.getElementById('topTitle').textContent = 'Part 7 單項練習';
  document.getElementById('topBadge').textContent = set.label;
  document.getElementById('partTag').textContent   = `Part 7 · 閱讀理解`;
  document.getElementById('partTitle').textContent = 'Reading Comprehension';
  document.getElementById('partDir').textContent   = 'Read the text and choose the best answer for each question.';

  let passageHtml = '';
  if (set.type === 'single') {
    passageHtml = `<div class="reading-passage">${set.passage}</div>`;
  } else if (set.type === 'double') {
    passageHtml = `<div class="double-passage-wrap">${set.passages.map(p=>`<div class="reading-passage">${p.content}</div>`).join('')}</div>`;
  }
  const passDiv = document.createElement('div');
  passDiv.innerHTML = passageHtml;
  body.appendChild(passDiv);

  questions = set.qs.map((q, i) => ({
    id: i, qn: q.n, q: q.q, opts: q.opts, ans: q.ans, exp: q.exp, zh: q.zh
  }));
  questions.forEach(q => body.appendChild(makeQCard(q)));
}

// ── Q Card factory ──
function makeQCard(q) {
  const card = document.createElement('div');
  card.className = 'q-card'; card.id = 'qcard' + q.id;
  card.innerHTML = `
    <div class="q-num">Question ${q.id + 1}</div>
    <div class="q-text">${makeBlank(q.q)}</div>
    <div class="options">${q.opts.map((o,oi)=>`
      <button class="opt-btn" id="opt${q.id}_${oi}" onclick="selectOpt(${q.id},${oi})">
        <span class="opt-label">${'ABCD'[oi]}</span><span>${o}</span>
      </button>`).join('')}
    </div>
    <div class="explanation" id="exp${q.id}">
      <div class="exp-answer">ANSWER: (${String.fromCharCode(65+q.ans)}) ${q.opts[q.ans]}</div>
      <div class="exp-text">${q.exp}</div>
      <div class="exp-zh">【中文解析】${q.zh}</div>
      ${q.trans ? `<div class="exp-trans"><div class="exp-trans-label">句子翻譯</div>${q.trans}</div>` : ''}
    </div>`;
  return card;
}

// ─────────────────────────────────────────
// INTERACTION
// ─────────────────────────────────────────
function selectOpt(id, oi) {
  if (submitted) return;
  const prev = answered[id];
  if (prev !== undefined) document.getElementById(`opt${id}_${prev}`).classList.remove('selected');
  answered[id] = oi;
  document.getElementById(`opt${id}_${oi}`).classList.add('selected');
  updateProgress();
}

function updateProgress() {
  const done  = Object.keys(answered).length;
  const total = questions.length;
  document.getElementById('progressText').textContent = `${done} / ${total} 已作答`;
}

// ─────────────────────────────────────────
// SUBMIT
// ─────────────────────────────────────────
function submitPractice() {
  if (submitted) return;
  submitted = true;

  let score = 0;
  const answerLog = [];

  questions.forEach(q => {
    const chosen = answered[q.id];
    for (let oi = 0; oi < 4; oi++) {
      document.getElementById(`opt${q.id}_${oi}`)?.classList.add('disabled');
      document.getElementById(`opt${q.id}_${oi}`)?.classList.remove('selected');
    }
    if (chosen === undefined) {
      document.getElementById(`opt${q.id}_${q.ans}`)?.classList.add('show-correct');
    } else if (chosen === q.ans) {
      document.getElementById(`opt${q.id}_${chosen}`)?.classList.add('correct');
      score++;
    } else {
      document.getElementById(`opt${q.id}_${chosen}`)?.classList.add('wrong');
      document.getElementById(`opt${q.id}_${q.ans}`)?.classList.add('show-correct');
    }
    document.getElementById(`exp${q.id}`)?.classList.add('show');

    answerLog.push({
      qn: q.qn || (q.id + 1),
      selectedLabel: chosen !== undefined ? 'ABCD'[chosen] : '—',
      correct: chosen === q.ans
    });
  });

  // Show score panel
  const panel = document.getElementById('scorePanel');
  panel.classList.add('show');
  document.getElementById('scoreBig').innerHTML = `${score} <span>/ ${questions.length}</span>`;
  document.getElementById('scorePct').textContent = Math.round(score / questions.length * 100) + '% 正確率';
  document.getElementById('submitBtn').style.display = 'none';
  document.querySelector('.bottom-bar').style.display = 'none';
  document.getElementById('postActions').classList.add('show');
  if (PART === 5) {
    document.getElementById('more5Btn').style.display = 'inline-block';
    document.getElementById('more10Btn').style.display = 'inline-block';
  }
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  sendToSheet(score, questions.length, answerLog);
}

// ─────────────────────────────────────────
function goMore(n) {
  window.location.href = `practice.html?part=5&n=${n}`;
}

// SEND TO GOOGLE SHEETS
// ─────────────────────────────────────────
function sendToSheet(score, total, answerLog) {
  if (!APPS_SCRIPT_URL) return;
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const timestamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  const payload = {
    type: 'practice',
    timestamp,
    name: studentName,
    label: setLabel,
    score,
    total,
    answers: answerLog
  };

  const statusEl = document.getElementById('submitStatus');
  statusEl.textContent = '正在儲存作答紀錄…';
  statusEl.classList.add('show');

  fetch(APPS_SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(() => {
    statusEl.textContent = '✓ 作答紀錄已儲存';
    statusEl.style.color = '#1D9E75';
  })
  .catch(() => {
    statusEl.textContent = '⚠ 紀錄儲存失敗';
    statusEl.style.color = '#E24B4A';
  });
}
</script>
</body>
</html>
